<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تجهيز الطلب - برجمان</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #093257, #0ea5e9);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .prepare-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px 24px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #093257, #0ea5e9);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 12px;
            color: white;
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
        }
        h1 {
            color: #333;
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .order-id {
            color: #666;
            font-size: 0.9rem;
            background: #f5f5f5;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
        }
        .login-section {
            margin: 20px 0;
            padding: 20px;
            background: linear-gradient(135deg, #f5f5f5, #e0e0e0);
            border-radius: 20px;
        }
        .input-field {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 1rem;
            margin-bottom: 15px;
            font-family: 'Tajawal', sans-serif;
        }
        .input-field:focus {
            border-color: #0ea5e9;
            outline: none;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            cursor: pointer;
            color: #555;
        }
        .checkbox-label input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #0ea5e9;
        }
        .btn {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            font-family: 'Tajawal', sans-serif;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        .error-message {
            color: #dc2626;
            text-align: center;
            margin: 10px 0;
            font-weight: 600;
        }
        .success-message {
            color: #10b981;
            text-align: center;
            margin: 10px 0;
            font-weight: 600;
        }
        .info-message {
            background: #fef3c7;
            border: 2px solid #f59e0b;
            border-radius: 12px;
            padding: 10px;
            color: #b45309;
            text-align: center;
            margin: 10px 0;
        }
        .user-info {
            background: #0ea5e910;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #093257, #0ea5e9);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }
        .user-details {
            flex: 1;
        }
        .user-name {
            font-weight: 800;
            color: #093257;
            font-size: 1rem;
        }
        .user-role {
            font-size: 0.8rem;
            color: #666;
        }
        .logout-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .product-item {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
        }
        .product-name {
            font-weight: 800;
            color: #093257;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        .product-detail {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        .volume-badge {
            background: #0ea5e920;
            color: #0284c7;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.8rem;
        }
        .total-volume {
            background: linear-gradient(135deg, #09325720, #0ea5e920);
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
        }
        .total-volume-value {
            font-size: 1.8rem;
            font-weight: 900;
            color: #093257;
        }
        .vehicle-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .vehicle-option {
            border: 2px solid #ddd;
            border-radius: 15px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .vehicle-option.selected {
            border-color: #0ea5e9;
            background: #0ea5e910;
        }
        .vehicle-icon {
            font-size: 2rem;
            margin-bottom: 5px;
        }
        .vehicle-name {
            font-weight: 700;
            color: #333;
        }
        .vehicle-capacity {
            font-size: 0.7rem;
            color: #666;
        }
        .capacity-bar {
            height: 10px;
            background: #e0e0e0;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }
        .capacity-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #0ea5e9);
            border-radius: 10px;
            transition: width 0.3s;
        }
        .capacity-text {
            text-align: center;
            font-weight: 700;
            color: #093257;
            margin: 10px 0;
        }
        .loader {
            text-align: center;
            padding: 40px;
        }
        .loader span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #0ea5e9;
            margin: 0 3px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        .hidden {
            display: none;
        }
        .remember-info {
            font-size: 0.8rem;
            color: #666;
            margin-top: 5px;
            text-align: center;
        }
        .notifications-icon {
  position: fixed;
  top: 20px;
  left: 20px;
  width: 45px;
  height: 45px;
  background: linear-gradient(135deg, #0ea5e9, #0284c7);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 1.5rem;
  cursor: pointer;
  z-index: 1000;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.notif-badge {
  position: absolute;
  top: -5px;
  right: -5px;
  background: #ef4444;
  color: white;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  font-size: 0.7rem;
  display: flex;
  align-items: center;
  justify-content: center;
}

.notifications-panel {
  position: fixed;
  top: 75px;
  left: 20px;
  width: 320px;
  max-width: calc(100% - 40px);
  background: white;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  z-index: 999;
  overflow: hidden;
}

.notif-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 15px;
  background: linear-gradient(135deg, #093257, #0ea5e9);
  color: white;
}

.notif-header h3 {
  margin: 0;
  font-size: 1rem;
}

.notif-header button {
  background: transparent;
  border: none;
  color: white;
  font-size: 1.2rem;
  cursor: pointer;
}

.notif-list {
  max-height: 400px;
  overflow-y: auto;
}

.notification-item {
  display: flex;
  gap: 10px;
  padding: 12px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
  transition: background 0.2s;
}

.notification-item:hover {
  background: #f5f5f5;
}

.notif-icon {
  width: 35px;
  height: 35px;
  background: #0ea5e920;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #0ea5e9;
  font-size: 1.1rem;
  flex-shrink: 0;
}

.notif-content {
  flex: 1;
}

.notif-title {
  font-weight: 700;
  color: #093257;
  font-size: 0.9rem;
}

.notif-body {
  color: #666;
  font-size: 0.8rem;
  margin: 2px 0;
}

.notif-date {
  color: #999;
  font-size: 0.7rem;
}

.notif-order-btn {
  background: #10b981;
  color: white;
  border: none;
  border-radius: 5px;
  padding: 5px 8px;
  font-size: 0.7rem;
  cursor: pointer;
  white-space: nowrap;
}
    </style>
</head>
<body>
    <div class="prepare-card">
        <div class="header">
            <div class="logo">📦</div>
            <h1>تجهيز الطلب</h1>
            <div class="order-id" id="orderId">...</div>
        </div>

        <!-- ✅ قسم تسجيل الدخول -->
        <div id="loginSection" class="login-section">
            <h2 style="margin-bottom:15px; color:#093257;">🔐 تسجيل دخول المجهز</h2>
            <input type="text" id="username" class="input-field" placeholder="اسم المستخدم" autocomplete="off">
            <input type="password" id="password" class="input-field" placeholder="كلمة المرور">
            
            <!-- ✅ إضافة خيار "تذكرني" -->
            <label class="checkbox-label">
                <input type="checkbox" id="rememberMe" checked>
                <span>🔓 تذكرني (ما يحتاج تسجيل دخول في المرات القادمة)</span>
            </label>
            
            <button class="btn" onclick="login()" id="loginBtn">دخول</button>
            <div id="loginError" class="error-message"></div>
            <div id="loginInfo" class="info-message hidden">
                ⚠️ استخدم بيانات حساب من نوع "مجهز" مضاف من لوحة الأدمن
            </div>
        </div>

        <!-- ✅ قسم معلومات المستخدم (يظهر بعد تسجيل الدخول) -->
        <div id="userSection" class="hidden">
            <div class="user-info">
                <div class="user-avatar">👤</div>
                <div class="user-details">
                    <div class="user-name" id="userName"></div>
                    <div class="user-role" id="userRole">📦 مجهز</div>
                </div>
                <button class="logout-btn" onclick="logout()">تسجيل خروج</button>
            </div>
        </div>

        <!-- أيقونة الإشعارات -->
<div class="notifications-icon" onclick="toggleNotifPanel()">
  🔔
  <span class="notif-badge" id="notifBadge" style="display:none;">0</span>
</div>

<!-- لوحة الإشعارات -->
<div class="notifications-panel" id="notifPanel" style="display:none;">
  <div class="notif-header">
    <h3>📋 الإشعارات</h3>
    <button onclick="loadPreparerNotifications()">⟳</button>
  </div>
  <div class="notif-list" id="notifList"></div>
</div>

        <!-- ✅ قسم تفاصيل الطلب (يظهر بعد تسجيل الدخول) -->
        <div id="orderSection" class="hidden">
            <!-- المحتوى راح يتحمل هنا -->
        </div>
    </div>

    <script>
        // ✅ Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBMLyYD0U5v3B3CWv80i-1mUGpBpkNKB98",
            authDomain: "burjuman-6cb83.firebaseapp.com",
            projectId: "burjuman-6cb83",
            storageBucket: "burjuman-6cb83.firebasestorage.app",
            messagingSenderId: "177984721378",
            appId: "1:177984721378:web:afb0a673eb1a4f1c1b69bb"
        };

        // ✅ تشغيل Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ✅ قراءة رقم الطلب من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order');
        document.getElementById('orderId').textContent = orderId || 'لا يوجد رقم طلب';

        // ✅ سعة المركبات
        const VEHICLES = {
            'scooter': { name: 'ستوتة', icon: '🛵', capacity: 0.4 },
            'pickup': { name: 'بيك اب', icon: '🚐', capacity: 6 },
            'truck': { name: 'شاحنة', icon: '🚛', capacity: 30 }
        };

        // ✅ متغيرات
        let currentUser = null;
        let orderData = null;
        let totalVolume = 0;
        let selectedVehicle = null;

        // ✅ مفتاح التخزين في localStorage
        const STORAGE_KEY = 'preparer_session';

        // ✅ عند تحميل الصفحة، نتحقق من وجود جلسة محفوظة
        window.onload = function() {
            loadSavedSession();
        };

        // ✅ دالة تحميل الجلسة المحفوظة
        function loadSavedSession() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const session = JSON.parse(saved);
                    const now = Date.now();
                    if (now - session.timestamp < 24 * 60 * 60 * 1000) { // 24 ساعة
                        currentUser = {
                            username: session.username,
                            name: session.name,
                            phone: session.phone || '',
                            type: 'preparer'
                        };
                        
                        document.getElementById('loginSection').classList.add('hidden');
                        document.getElementById('userSection').classList.remove('hidden');
                        document.getElementById('userName').textContent = currentUser.name;
                        
                        loadOrder();
                    } else {
                        localStorage.removeItem(STORAGE_KEY);
                    }
                } catch (e) {
                    localStorage.removeItem(STORAGE_KEY);
                }
            }
        }

        // ✅ دالة حفظ الجلسة مع رقم الهاتف
        function saveSession(user) {
            const session = {
                username: user.username,
                name: user.name,
                phone: user.phone,
                timestamp: Date.now()
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(session));
        }

        // ✅ دالة تسجيل الدخول
        window.login = async function() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const rememberMe = document.getElementById('rememberMe').checked;
            const loginBtn = document.getElementById('loginBtn');
            const errorEl = document.getElementById('loginError');
            const infoEl = document.getElementById('loginInfo');

            if (!username || !password) {
                errorEl.textContent = '⚠️ أدخل اسم المستخدم وكلمة المرور';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = '⏳ جاري التحقق...';
            errorEl.textContent = '';
            infoEl.classList.add('hidden');

            try {
                const usersRef = db.collection('users');
                const snapshot = await usersRef.where('username', '==', username).get();

                if (snapshot.empty) {
                    errorEl.textContent = '❌ اسم المستخدم غير صحيح';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'دخول';
                    return;
                }

                const userDoc = snapshot.docs[0];
                const userData = userDoc.data();
                
                if (userData.password !== password) {
                    errorEl.textContent = '❌ كلمة المرور غير صحيحة';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'دخول';
                    return;
                }

                if (userData.type !== 'preparer' && userData.accountType !== 'preparer') {
                    errorEl.textContent = '❌ هذا الحساب ليس لمجهز';
                    infoEl.classList.remove('hidden');
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'دخول';
                    return;
                }

                // ✅ تسجيل الدخول ناجح - نحفظ رقم المجهز مع البيانات
                currentUser = {
                    username: userData.username,
                    name: userData.name || userData.username,
                    phone: userData.phone || '',
                    type: 'preparer'
                };

                if (rememberMe) {
                    saveSession(currentUser);
                }

                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('userSection').classList.remove('hidden');
                document.getElementById('userName').textContent = currentUser.name;
                
                loadOrder();

            } catch (error) {
                console.error('خطأ في تسجيل الدخول:', error);
                errorEl.textContent = '❌ حدث خطأ في الاتصال بقاعدة البيانات';
                loginBtn.disabled = false;
                loginBtn.textContent = 'دخول';
            }
        };

        // ✅ دالة تسجيل الخروج
        window.logout = function() {
            currentUser = null;
            orderData = null;
            selectedVehicle = null;
            
            localStorage.removeItem(STORAGE_KEY);
            
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('userSection').classList.add('hidden');
            document.getElementById('orderSection').classList.add('hidden');
            
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('loginError').textContent = '';
        };
startNotifPolling();
        // ✅ دالة تحميل الطلب
        async function loadOrder() {
            const orderSection = document.getElementById('orderSection');
            
            orderSection.classList.remove('hidden');
            orderSection.innerHTML = `
                <div class="loader">
                    <span></span><span></span><span></span>
                    <p style="margin-top:15px;">جاري تحميل الطلب...</p>
                </div>
            `;

            try {
                let orderDoc = null;
                const ordersRef = db.collection('orders');
                
                const snapshot = await ordersRef.where('orderId', '==', orderId).get();
                
                if (!snapshot.empty) {
                    orderDoc = snapshot.docs[0];
                } else {
                    orderDoc = await ordersRef.doc(orderId).get();
                    if (!orderDoc.exists) {
                        orderSection.innerHTML = '<div class="error-message">❌ الطلب غير موجود</div>';
                        return;
                    }
                }

                orderData = { id: orderDoc.id, ...orderDoc.data() };

                if (orderData.status === 'Prepared' || orderData.status === 'prepared') {
                    orderSection.innerHTML = `
                        <div class="info-message">
                            ⚠️ هذا الطلب تم تجهيزه مسبقاً بواسطة ${orderData.prepared_by_name || orderData.prepared_by || 'مجهز آخر'}
                        </div>
                        <button class="btn" onclick="logout()" style="margin-top:15px;">⬅️ رجوع</button>
                    `;
                    return;
                }

                displayOrderDetails();
                

                db.collection('orders').doc(orderData.id).onSnapshot((snap) => {
                    if (snap.exists) {
                        const updated = snap.data();
                        if (updated.status === 'Prepared' || updated.status === 'prepared') {
                            document.getElementById('prepareBtn').disabled = true;
                            document.getElementById('prepareMessage').innerHTML = `
                                <div class="info-message">✅ تم تجهيز هذا الطلب</div>
                            `;
                        }
                    }
                });

            } catch (error) {
                console.error('خطأ في تحميل الطلب:', error);
                orderSection.innerHTML = '<div class="error-message">❌ حدث خطأ في تحميل الطلب</div>';
            }
        }

        // ✅ دالة عرض تفاصيل الطلب
        function displayOrderDetails() {
            const orderSection = document.getElementById('orderSection');
            
            const productsList = orderData.products || '';
            const items = [];
            totalVolume = 0;

            const matches = productsList.match(/([^،,\n()]+)\((\d+)\)/g) || [];
            
            matches.forEach(m => {
                const mm = m.match(/(.+)\((\d+)\)/);
                if (mm) {
                    const name = mm[1].trim();
                    const qty = parseInt(mm[2]) || 1;
                    
                    const volume = 0.024;
                    const itemVol = volume * qty;
                    totalVolume += itemVol;
                    
                    items.push({
                        name,
                        qty,
                        volume,
                        totalVol: itemVol
                    });
                }
            });

            let productsHtml = '';
            items.forEach(item => {
                productsHtml += `
                    <div class="product-item">
                        <div class="product-name">${item.name}</div>
                        <div class="product-detail">
                            <span>الكمية: ${item.qty}</span>
                            <span class="volume-badge">📐 ${item.volume} م³ × ${item.qty}</span>
                        </div>
                        <div class="product-detail">
                            <span>الحجم الإجمالي:</span>
                            <span style="font-weight:700; color:#093257;">${item.totalVol.toFixed(3)} م³</span>
                        </div>
                    </div>
                `;
            });

            let vehiclesHtml = '';
            for (const [key, vehicle] of Object.entries(VEHICLES)) {
                vehiclesHtml += `
                    <div class="vehicle-option" onclick="selectVehicle('${key}')" id="vehicle-${key}">
                        <div class="vehicle-icon">${vehicle.icon}</div>
                        <div class="vehicle-name">${vehicle.name}</div>
                        <div class="vehicle-capacity">سعة ${vehicle.capacity} م³</div>
                    </div>
                `;
            }

            orderSection.innerHTML = `
                <div style="margin-bottom:20px;">
                    <h3 style="color:#093257; margin-bottom:10px;">🏪 معلومات الطلب</h3>
                    <div style="background:#f5f5f5; border-radius:12px; padding:12px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <span>المحل:</span>
                            <span style="font-weight:700;">${orderData.shopName || '—'}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between;">
                            <span>العنوان:</span>
                            <span style="font-weight:700;">${orderData.shopAddress || '—'}</span>
                        </div>
                    </div>
                </div>

                <h3 style="color:#093257; margin-bottom:10px;">📋 المنتجات</h3>
                ${productsHtml || '<div style="text-align:center; padding:15px;">لا توجد منتجات محددة</div>'}

                <div class="total-volume">
                    <div style="font-size:0.9rem; color:#666;">إجمالي حجم الطلب</div>
                    <div class="total-volume-value" id="totalVolume">${totalVolume.toFixed(3)} م³</div>
                </div>

                <h3 style="color:#093257; margin-bottom:10px;">🚚 اختر المركبة</h3>
                <div class="vehicle-selector">
                    ${vehiclesHtml}
                </div>

                <div id="capacityInfo" style="display:none;">
                    <div class="capacity-bar">
                        <div class="capacity-fill" id="capacityFill" style="width:0%"></div>
                    </div>
                    <div class="capacity-text" id="capacityText"></div>
                </div>

                <button class="btn btn-success" id="prepareBtn" onclick="prepareOrder()" disabled>
                    ✅ تأكيد التجهيز
                </button>

                <div id="prepareMessage" style="margin-top:15px;"></div>
                <div class="remember-info">🔓 جلسة الدخول محفوظة لمدة 24 ساعة</div>
            `;
        }

        // ✅ دالة اختيار المركبة
        window.selectVehicle = function(vehicleKey) {
            selectedVehicle = vehicleKey;
            
            for (const key of Object.keys(VEHICLES)) {
                const el = document.getElementById(`vehicle-${key}`);
                if (el) {
                    el.classList.toggle('selected', key === vehicleKey);
                }
            }

            const vehicle = VEHICLES[vehicleKey];
            const fillPercent = (totalVolume / vehicle.capacity) * 100;
            const cappedPercent = Math.min(100, fillPercent);

            document.getElementById('capacityInfo').style.display = 'block';
            document.getElementById('capacityFill').style.width = `${cappedPercent}%`;
            
            let statusText = '';
            if (fillPercent > 100) {
                statusText = `⚠️ الطلب أكبر من سعة ${vehicle.name} ب ${(totalVolume - vehicle.capacity).toFixed(3)} م³`;
                document.getElementById('prepareBtn').disabled = true;
            } else {
                statusText = `${vehicle.name} ستشغل ${cappedPercent.toFixed(0)}% من سعتها (${totalVolume.toFixed(3)} / ${vehicle.capacity} م³)`;
                document.getElementById('prepareBtn').disabled = false;
            }
            
            document.getElementById('capacityText').textContent = statusText;
        };

        // ✅ دالة تجهيز الطلب
        window.prepareOrder = async function() {
            if (!selectedVehicle) {
                alert('⚠️ اختر المركبة أولاً');
                return;
            }

            if (!confirm('هل أنت متأكد من تجهيز هذا الطلب؟ لا يمكن التراجع بعد التأكيد')) {
                return;
            }

            const btn = document.getElementById('prepareBtn');
            btn.disabled = true;
            btn.textContent = '⏳ جاري التجهيز...';

            try {
                await db.collection('orders').doc(orderData.id).update({
                    status: 'Prepared',
                    prepared_by: currentUser.username,
                    prepared_by_name: currentUser.name,
                    prepared_at: new Date().toISOString(),
                    vehicle_type: VEHICLES[selectedVehicle].name
                });

                document.getElementById('prepareMessage').innerHTML = `
                    <div class="success-message">
                        ✅ تم تجهيز الطلب بنجاح
                    </div>
                `;

                const TG_TOKEN = '8142978736:AAEpT6L_RNNIUMx54mU83gx4ap_Z3VmuXsA';
                const TG_CHAT  = '-5246620507';
                fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({
                        chat_id: TG_CHAT,
                        text: `🚗 طلب جاهز للتوصيل\n🏪 ${orderData.shopName}\n🆔 ${orderId}\n🚚 المركبة: ${VEHICLES[selectedVehicle].name}`,
                    })
                }).catch(() => {});

            } catch (error) {
                console.error(error);
                document.getElementById('prepareMessage').innerHTML = `
                    <div class="error-message">
                        ❌ حدث خطأ: ${error.message}
                    </div>
                `;
                btn.disabled = false;
                btn.textContent = '✅ تأكيد التجهيز';
            }
        };

        // ✅ دالة جلب إشعارات المجهز
async function loadPreparerNotifications() {
  if (!currentUser) return;
  
  const notifBadge = document.getElementById('notifBadge');
  const notifList = document.getElementById('notifList');
  
  try {
    const notificationsRef = db.collection('notifications');
    const snapshot = await notificationsRef
      .where('targetUser', '==', currentUser.username)
      .where('type', '==', 'preparer')
      .where('read', '==', false)
      .orderBy('timestamp', 'desc')
      .limit(10)
      .get();
    
    if (notifBadge) {
      notifBadge.textContent = snapshot.size;
      notifBadge.style.display = snapshot.size > 0 ? 'flex' : 'none';
    }
    
    if (notifList) {
      if (snapshot.empty) {
        notifList.innerHTML = '<div style="text-align:center; padding:20px; color:#666;">🚫 لا توجد إشعارات</div>';
      } else {
        notifList.innerHTML = snapshot.docs.map(doc => {
          const notif = doc.data();
          return `
            <div class="notification-item" data-id="${doc.id}" onclick="markNotifRead('${doc.id}')">
              <div class="notif-icon">📦</div>
              <div class="notif-content">
                <div class="notif-title">${notif.title}</div>
                <div class="notif-body">${notif.body}</div>
                <div class="notif-date">${notif.date}</div>
              </div>
              <button class="notif-order-btn" onclick="event.stopPropagation(); loadOrderFromNotif('${notif.orderId}')">عرض الطلب</button>
            </div>
          `;
        }).join('');
      }
    }
  } catch (error) {
    console.error('خطأ في جلب الإشعارات:', error);
  }
}

// ✅ دالة تحديث الإشعارات كل 30 ثانية
function startNotifPolling() {
  loadPreparerNotifications();
  setInterval(loadPreparerNotifications, 30000);
}

// ✅ دالة تحديد الإشعار كمقروء
async function markNotifRead(notifId) {
  await db.collection('notifications').doc(notifId).update({ read: true });
  loadPreparerNotifications();
}

// ✅ دالة تحميل الطلب من الإشعار
function loadOrderFromNotif(orderId) {
  window.location.href = `prepare.html?order=${orderId}`;
}
    </script>
</body>
