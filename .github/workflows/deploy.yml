name: 🚀 Build & Deploy — برجمان

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔑 Inject Firebase Config into firebase.js
        run: |
          sed \
            -e 's|%%FIREBASE_API_KEY%%|${{ secrets.FIREBASE_API_KEY }}|g' \
            -e 's|%%FIREBASE_AUTH_DOMAIN%%|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g' \
            -e 's|%%FIREBASE_PROJECT_ID%%|${{ secrets.FIREBASE_PROJECT_ID }}|g' \
            -e 's|%%FIREBASE_STORAGE_BUCKET%%|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g' \
            -e 's|%%FIREBASE_MESSAGING_SENDER_ID%%|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g' \
            -e 's|%%FIREBASE_APP_ID%%|${{ secrets.FIREBASE_APP_ID }}|g' \
            js/firebase.template.js > js/firebase.js

      - name: 🔑 Inject Firebase Config into sw.js
        run: |
          sed \
            -e 's|%%FIREBASE_API_KEY%%|${{ secrets.FIREBASE_API_KEY }}|g' \
            -e 's|%%FIREBASE_AUTH_DOMAIN%%|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g' \
            -e 's|%%FIREBASE_PROJECT_ID%%|${{ secrets.FIREBASE_PROJECT_ID }}|g' \
            -e 's|%%FIREBASE_STORAGE_BUCKET%%|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g' \
            -e 's|%%FIREBASE_MESSAGING_SENDER_ID%%|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g' \
            -e 's|%%FIREBASE_APP_ID%%|${{ secrets.FIREBASE_APP_ID }}|g' \
            sw.template.js > sw.js

      - name: ⚙️ Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📦 Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
