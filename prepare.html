<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تجهيز الطلب - برجمان</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #093257, #0ea5e9);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .prepare-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px 24px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #093257, #0ea5e9);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 12px;
            color: white;
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
        }
        h1 {
            color: #333;
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .order-id {
            color: #666;
            font-size: 0.9rem;
            background: #f5f5f5;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
        }
        .login-section {
            margin: 20px 0;
            padding: 20px;
            background: linear-gradient(135deg, #f5f5f5, #e0e0e0);
            border-radius: 20px;
        }
        .input-field {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 1rem;
            margin-bottom: 15px;
            font-family: 'Tajawal', sans-serif;
        }
        .input-field:focus {
            border-color: #0ea5e9;
            outline: none;
        }
        .btn {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            font-family: 'Tajawal', sans-serif;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        .product-item {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
        }
        .product-name {
            font-weight: 800;
            color: #093257;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        .product-detail {
            display: flex;
            justify-content: space-between;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        .volume-badge {
            background: #0ea5e920;
            color: #0284c7;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.8rem;
        }
        .total-volume {
            background: linear-gradient(135deg, #09325720, #0ea5e920);
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
        }
        .total-volume-value {
            font-size: 1.8rem;
            font-weight: 900;
            color: #093257;
        }
        .vehicle-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .vehicle-option {
            border: 2px solid #ddd;
            border-radius: 15px;
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .vehicle-option.selected {
            border-color: #0ea5e9;
            background: #0ea5e910;
        }
        .vehicle-icon {
            font-size: 2rem;
            margin-bottom: 5px;
        }
        .vehicle-name {
            font-weight: 700;
            color: #333;
        }
        .vehicle-capacity {
            font-size: 0.7rem;
            color: #666;
        }
        .capacity-bar {
            height: 10px;
            background: #e0e0e0;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }
        .capacity-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #0ea5e9);
            border-radius: 10px;
            transition: width 0.3s;
        }
        .capacity-text {
            text-align: center;
            font-weight: 700;
            color: #093257;
            margin: 10px 0;
        }
        .loader {
            text-align: center;
            padding: 40px;
        }
        .loader span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #0ea5e9;
            margin: 0 3px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .error {
            color: #dc2626;
            text-align: center;
            padding: 20px;
        }
        .success {
            color: #10b981;
            text-align: center;
            padding: 20px;
        }
        .warning {
            background: #fef3c7;
            border: 2px solid #f59e0b;
            border-radius: 12px;
            padding: 10px;
            color: #b45309;
            text-align: center;
            margin: 10px 0;
        }
        .user-info {
            background: #0ea5e910;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #093257, #0ea5e9);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }
        .user-details {
            flex: 1;
        }
        .user-name {
            font-weight: 800;
            color: #093257;
        }
        .user-role {
            font-size: 0.8rem;
            color: #666;
        }
        .logout-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="prepare-card" id="prepareCard">
        <div class="header">
            <div class="logo">📦</div>
            <h1>تجهيز الطلب</h1>
            <div class="order-id" id="orderId">...</div>
        </div>

        <!-- قسم تسجيل الدخول -->
        <div id="loginSection" class="login-section">
            <h2 style="margin-bottom:15px; color:#093257;">🔐 تسجيل دخول المجهز</h2>
            <input type="text" id="username" class="input-field" placeholder="اسم المستخدم">
            <input type="password" id="password" class="input-field" placeholder="كلمة المرور">
            <button class="btn" onclick="login()">دخول</button>
            <div id="loginError" style="color:#dc2626; margin-top:10px; text-align:center;"></div>
        </div>

        <!-- قسم معلومات المستخدم (يظهر بعد تسجيل الدخول) -->
        <div id="userSection" style="display:none;">
            <div class="user-info">
                <div class="user-avatar">👤</div>
                <div class="user-details">
                    <div class="user-name" id="userName"></div>
                    <div class="user-role" id="userRole"></div>
                </div>
                <button class="logout-btn" onclick="logout()">تسجيل خروج</button>
            </div>
        </div>

        <!-- قسم الطلب (يظهر بعد تسجيل الدخول) -->
        <div id="orderSection" style="display:none;"></div>
    </div>

    <script>
        // ✅ Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBMLyYD0U5v3B3CWv80i-1mUGpBpkNKB98",
            authDomain: "burjuman-6cb83.firebaseapp.com",
            projectId: "burjuman-6cb83",
            storageBucket: "burjuman-6cb83.firebasestorage.app",
            messagingSenderId: "177984721378",
            appId: "1:177984721378:web:afb0a673eb1a4f1c1b69bb"
        };

        // ✅ تشغيل Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // ✅ قراءة رقم الطلب من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order');
        document.getElementById('orderId').textContent = orderId || 'غير موجود';

        // ✅ سعة المركبات
        const VEHICLES = {
            'scooter': { name: 'ستوتة', icon: '🛵', capacity: 0.4 },
            'pickup': { name: 'بيك اب', icon: '🚐', capacity: 6 },
            'truck': { name: 'شاحنة', icon: '🚛', capacity: 30 }
        };

        let selectedVehicle = null;
        let orderData = null;
        let totalVolume = 0;
        let currentUser = null;

        // ✅ التحقق من حالة تسجيل الدخول عند تحميل الصفحة
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                // المستخدم مسجل دخوله
                currentUser = user;
                
                // جلب بيانات المستخدم من Firestore
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (userDoc.exists) {
                    const userData = userDoc.data();
                    
                    // التحقق من أن نوع الحساب مجهز
                    if (userData.type === 'preparer') {
                        // ✅ عرض معلومات المستخدم
                        document.getElementById('userName').textContent = userData.name || user.email;
                        document.getElementById('userRole').textContent = '📦 مجهز';
                        
                        document.getElementById('loginSection').style.display = 'none';
                        document.getElementById('userSection').style.display = 'block';
                        
                        // تحميل الطلب
                        loadOrder();
                    } else {
                        // ❌ ليس مجهزاً - تسجيل خروج
                        alert('⚠️ هذا الحساب ليس لمجهز');
                        logout();
                    }
                } else {
                    // ❌ مستخدم غير موجود في Firestore
                    alert('⚠️ بيانات المستخدم غير موجودة');
                    logout();
                }
            } else {
                // المستخدم غير مسجل - نعرض واجهة تسجيل الدخول
                document.getElementById('loginSection').style.display = 'block';
                document.getElementById('userSection').style.display = 'none';
                document.getElementById('orderSection').style.display = 'none';
            }
        });

        // ✅ دالة تسجيل الدخول
        window.login = async function() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorEl = document.getElementById('loginError');

            if (!username || !password) {
                errorEl.textContent = '⚠️ أدخل اسم المستخدم وكلمة المرور';
                return;
            }

            errorEl.textContent = '⏳ جاري التحقق...';

            try {
                // البحث عن المستخدم في Firestore
                const usersRef = db.collection('users');
                const snapshot = await usersRef.where('username', '==', username).get();

                if (snapshot.empty) {
                    errorEl.textContent = '❌ اسم المستخدم غير صحيح';
                    return;
                }

                const userDoc = snapshot.docs[0];
                const userData = userDoc.data();
                
                // تحقق من كلمة المرور
                if (userData.password !== password) {
                    errorEl.textContent = '❌ كلمة المرور غير صحيحة';
                    return;
                }

                // تحقق من نوع الحساب (مجهز)
                if (userData.type !== 'preparer') {
                    errorEl.textContent = '❌ هذا الحساب ليس لمجهز';
                    return;
                }

                // ✅ تسجيل الدخول ناجح - نستخدم Firebase Auth
                // ننشئ حساب في Firebase Auth إذا ما موجود
                try {
                    // نحاول تسجيل الدخول باستخدام الإيميل (إذا موجود)
                    if (userData.email) {
                        await auth.signInWithEmailAndPassword(userData.email, password);
                    } else {
                        // إذا ماكو إيميل، ننشئ حساب مؤقت
                        // هذا الجزء يحتاج تعديل حسب نظامك
                        errorEl.textContent = '⚠️ المستخدم لا يملك إيميل';
                    }
                } catch (authError) {
                    console.error('Auth error:', authError);
                    errorEl.textContent = '❌ خطأ في المصادقة';
                }

            } catch (error) {
                console.error(error);
                errorEl.textContent = '❌ حدث خطأ، حاول مجدداً';
            }
        };

        // ✅ دالة تسجيل الخروج
        window.logout = function() {
            auth.signOut();
            currentUser = null;
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('userSection').style.display = 'none';
            document.getElementById('orderSection').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        };

        // ✅ دالة تحميل الطلب
        async function loadOrder() {
            const orderSection = document.getElementById('orderSection');
            
            if (!orderId) {
                orderSection.innerHTML = '<div class="error">❌ رقم الطلب غير موجود</div>';
                orderSection.style.display = 'block';
                return;
            }

            orderSection.innerHTML = `
                <div class="loader">
                    <span></span><span></span><span></span>
                    <p style="margin-top:15px;">جاري تحميل الطلب...</p>
                </div>
            `;
            orderSection.style.display = 'block';

            try {
                // البحث عن الطلب
                let orderDoc = null;
                const ordersRef = db.collection('orders');
                
                // حاول بالـ orderId
                const snapshot = await ordersRef.where('orderId', '==', orderId).get();
                
                if (!snapshot.empty) {
                    orderDoc = snapshot.docs[0];
                } else {
                    // جرب بالـ id نفسه
                    orderDoc = await ordersRef.doc(orderId).get();
                    if (!orderDoc.exists) {
                        orderSection.innerHTML = '<div class="error">❌ الطلب غير موجود</div>';
                        return;
                    }
                }

                orderData = { id: orderDoc.id, ...orderDoc.data() };

                // إذا كان الطلب مجهز مسبقاً
                if (orderData.status === 'Prepared' || orderData.status === 'prepared') {
                    orderSection.innerHTML = `
                        <div class="warning">
                            ⚠️ هذا الطلب تم تجهيزه مسبقاً بواسطة ${orderData.prepared_by_name || orderData.prepared_by}
                        </div>
                        <div style="text-align:center; margin-top:20px;">
                            <a href="https://karrarkasem.github.io/1/" class="btn">العودة للرئيسية</a>
                        </div>
                    `;
                    return;
                }

                // عرض تفاصيل الطلب
                displayOrderDetails();

                // استماع لتغييرات الطلب
                db.collection('orders').doc(orderData.id).onSnapshot((snap) => {
                    if (snap.exists) {
                        const updated = snap.data();
                        if (updated.status === 'Prepared' || updated.status === 'prepared') {
                            document.getElementById('prepareBtn').disabled = true;
                            document.getElementById('prepareMessage').innerHTML = `
                                <div class="warning">✅ تم تجهيز هذا الطلب</div>
                            `;
                        }
                    }
                });

            } catch (error) {
                console.error(error);
                orderSection.innerHTML = '<div class="error">❌ حدث خطأ في تحميل الطلب</div>';
            }
        }

        // ✅ دالة عرض تفاصيل الطلب
        function displayOrderDetails() {
            const orderSection = document.getElementById('orderSection');
            
            // تحليل المنتجات
            const productsList = orderData.products || '';
            const items = [];
            totalVolume = 0;

            // محاولة استخراج المنتجات من النص
            const matches = productsList.match(/([^،,\n()]+)\((\d+)\)/g) || [];
            
            matches.forEach(m => {
                const mm = m.match(/(.+)\((\d+)\)/);
                if (mm) {
                    const name = mm[1].trim();
                    const qty = parseInt(mm[2]) || 1;
                    // حجم تجريبي (المفروض تجيب الحجم من قاعدة البيانات)
                    const volume = 0.024;
                    const itemVol = volume * qty;
                    totalVolume += itemVol;
                    
                    items.push({
                        name,
                        qty,
                        volume,
                        totalVol: itemVol
                    });
                }
            });

            // عرض المنتجات
            let productsHtml = '';
            items.forEach(item => {
                productsHtml += `
                    <div class="product-item">
                        <div class="product-name">${item.name}</div>
                        <div class="product-detail">
                            <span>الكمية: ${item.qty}</span>
                            <span class="volume-badge">📐 ${item.volume} م³ × ${item.qty}</span>
                        </div>
                        <div class="product-detail">
                            <span>الحجم الإجمالي:</span>
                            <span style="font-weight:700; color:#093257;">${item.totalVol.toFixed(3)} م³</span>
                        </div>
                    </div>
                `;
            });

            // خيارات المركبات
            let vehiclesHtml = '';
            for (const [key, vehicle] of Object.entries(VEHICLES)) {
                vehiclesHtml += `
                    <div class="vehicle-option" onclick="selectVehicle('${key}')" id="vehicle-${key}">
                        <div class="vehicle-icon">${vehicle.icon}</div>
                        <div class="vehicle-name">${vehicle.name}</div>
                        <div class="vehicle-capacity">سعة ${vehicle.capacity} م³</div>
                    </div>
                `;
            }

            orderSection.innerHTML = `
                <div style="margin-bottom:20px;">
                    <h3 style="color:#093257; margin-bottom:10px;">🏪 معلومات الطلب</h3>
                    <div style="background:#f5f5f5; border-radius:12px; padding:12px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <span>المحل:</span>
                            <span style="font-weight:700;">${orderData.shopName || '—'}</span>
                        </div>
                        <div style="display:flex; justify-content:space-between;">
                            <span>العنوان:</span>
                            <span style="font-weight:700;">${orderData.shopAddress || '—'}</span>
                        </div>
                    </div>
                </div>

                <h3 style="color:#093257; margin-bottom:10px;">📋 المنتجات</h3>
                ${productsHtml}

                <div class="total-volume">
                    <div style="font-size:0.9rem; color:#666;">إجمالي حجم الطلب</div>
                    <div class="total-volume-value" id="totalVolume">${totalVolume.toFixed(3)} م³</div>
                </div>

                <h3 style="color:#093257; margin-bottom:10px;">🚚 اختر المركبة</h3>
                <div class="vehicle-selector" id="vehicleSelector">
                    ${vehiclesHtml}
                </div>

                <div id="capacityInfo" style="display:none;">
                    <div class="capacity-bar">
                        <div class="capacity-fill" id="capacityFill" style="width:0%"></div>
                    </div>
                    <div class="capacity-text" id="capacityText"></div>
                </div>

                <button class="btn btn-success" id="prepareBtn" onclick="prepareOrder()" disabled>
                    ✅ تأكيد التجهيز
                </button>

                <div id="prepareMessage" style="margin-top:15px;"></div>
            `;
        }

        // ✅ دالة اختيار المركبة
        window.selectVehicle = function(vehicleKey) {
            selectedVehicle = vehicleKey;
            
            // تحديث واجهة الاختيار
            for (const key of Object.keys(VEHICLES)) {
                const el = document.getElementById(`vehicle-${key}`);
                if (el) {
                    el.classList.toggle('selected', key === vehicleKey);
                }
            }

            // عرض نسبة التحميل
            const vehicle = VEHICLES[vehicleKey];
            const fillPercent = (totalVolume / vehicle.capacity) * 100;
            const cappedPercent = Math.min(100, fillPercent);

            document.getElementById('capacityInfo').style.display = 'block';
            document.getElementById('capacityFill').style.width = `${cappedPercent}%`;
            
            let statusText = '';
            if (fillPercent > 100) {
                statusText = `⚠️ الطلب أكبر من سعة ${vehicle.name} ب ${(totalVolume - vehicle.capacity).toFixed(3)} م³`;
                document.getElementById('prepareBtn').disabled = true;
            } else {
                statusText = `${vehicle.name} ستشغل ${cappedPercent.toFixed(0)}% من سعتها (${totalVolume.toFixed(3)} / ${vehicle.capacity} م³)`;
                document.getElementById('prepareBtn').disabled = false;
            }
            
            document.getElementById('capacityText').textContent = statusText;
        };

        // ✅ دالة تجهيز الطلب
        window.prepareOrder = async function() {
            if (!selectedVehicle) {
                alert('⚠️ اختر المركبة أولاً');
                return;
            }

            if (!confirm('هل أنت متأكد من تجهيز هذا الطلب؟ لا يمكن التراجع بعد التأكيد')) {
                return;
            }

            const btn = document.getElementById('prepareBtn');
            btn.disabled = true;
            btn.textContent = '⏳ جاري التجهيز...';

            try {
                // جلب معلومات المستخدم الحالي
                const user = auth.currentUser;
                const userDoc = await db.collection('users').where('username', '==', user.email?.split('@')[0]).get();
                const userName = userDoc.empty ? 'مجهز' : userDoc.docs[0].data().name;

                // تحديث الطلب في Firebase
                await db.collection('orders').doc(orderData.id).update({
                    status: 'Prepared',
                    prepared_by: user.email,
                    prepared_by_name: userName,
                    prepared_at: new Date().toISOString(),
                    vehicle_type: VEHICLES[selectedVehicle].name
                });

                document.getElementById('prepareMessage').innerHTML = `
                    <div class="success">
