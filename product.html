<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <!-- Open Graph -->
  <meta property="og:type"         content="product">
  <meta property="og:site_name"    content="برجمان"  id="ogSite">
  <meta property="og:title"        content="برجمان"  id="ogTitle">
  <meta property="og:description"  content=""        id="ogDesc">
  <meta property="og:image"        content=""        id="ogImage">
  <meta property="og:image:width"  content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url"          content=""        id="ogUrl">
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content=""        id="twTitle">
  <meta name="twitter:description" content=""        id="twDesc">
  <meta name="twitter:image"       content=""        id="twImage">

  <title id="pageTitle">جاري التحميل...</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Cairo',sans-serif;background:#f0f4f8;min-height:100vh;color:#0f172a}

    /* ── شاشة التحميل ── */
    #loadScreen{
      position:fixed;inset:0;background:#0d9488;display:flex;flex-direction:column;
      align-items:center;justify-content:center;z-index:99;transition:opacity .4s
    }
    .ls-spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.3);
      border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
    .ls-brand{color:white;font-size:1.4rem;font-weight:900}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── الهيدر ── */
    .top-bar{
      background:linear-gradient(135deg,#0d9488,#0891b2);
      padding:14px 20px;display:flex;align-items:center;gap:12px;
      position:sticky;top:0;z-index:10;box-shadow:0 2px 12px rgba(0,0,0,.15)
    }
    .top-bar .logo-box{
      width:40px;height:40px;border-radius:10px;overflow:hidden;
      background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0
    }
    .top-bar .logo-box img{width:100%;height:100%;object-fit:cover}
    .top-bar .logo-box .logo-emoji{font-size:1.4rem}
    .top-bar .brand-name{color:white;font-size:1.05rem;font-weight:900;flex:1}
    .top-bar .store-link{
      color:white;font-size:.78rem;font-weight:700;text-decoration:none;
      background:rgba(255,255,255,.2);padding:6px 12px;border-radius:20px;white-space:nowrap
    }

    /* ── صورة المنتج ── */
    .prod-img-wrap{
      background:white;position:relative;overflow:hidden;
      max-height:340px;display:flex;align-items:center;justify-content:center
    }
    .prod-img-wrap img{width:100%;max-height:340px;object-fit:contain;display:block}
    .prod-img-wrap .no-img{
      height:200px;display:flex;align-items:center;justify-content:center;
      font-size:4rem;background:#f8fafc;width:100%
    }

    /* ── محتوى البطاقة ── */
    .card{background:white;margin:0;border-bottom:1px solid #e2e8f0}
    .card-body{padding:20px}

    .cat-badge{
      display:inline-flex;align-items:center;gap:5px;
      background:#e0f2fe;color:#0369a1;
      font-size:.72rem;font-weight:800;padding:4px 12px;border-radius:20px;margin-bottom:12px
    }
    .prod-name{font-size:1.35rem;font-weight:900;color:#0f172a;line-height:1.4;margin-bottom:8px}

    /* ── السعر ── */
    .price-section{
      background:linear-gradient(135deg,#f0fdf4,#dcfce7);
      border:1.5px solid #86efac;border-radius:14px;padding:14px 16px;
      margin-bottom:16px;display:flex;gap:16px;align-items:center;flex-wrap:wrap
    }
    .price-box{flex:1;text-align:center}
    .price-lbl{font-size:.68rem;font-weight:700;color:#6b7280;margin-bottom:4px}
    .price-val{font-size:1.4rem;font-weight:900;color:#15803d}
    .price-unit{font-size:.72rem;color:#6b7280;margin-top:2px}
    .price-divider{width:1px;background:#bbf7d0;align-self:stretch}
    .price-ask{
      flex:1;text-align:center;font-size:.8rem;font-weight:700;color:#0369a1;line-height:1.5
    }

    /* ── تفاصيل المنتج ── */
    .detail-txt{font-size:.88rem;color:#475569;line-height:1.8;margin-bottom:16px}

    /* ── شبكة التعبئة ── */
    .pkg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
    .pkg-item{
      background:#f8fafc;border:1px solid #e2e8f0;
      border-radius:12px;padding:12px 8px;text-align:center
    }
    .pkg-item .val{font-size:1.05rem;font-weight:900;color:#0f172a}
    .pkg-item .lbl{font-size:.65rem;color:#94a3b8;margin-top:3px;font-weight:600}

    /* ── أزرار ── */
    .wa-btn{
      display:flex;align-items:center;justify-content:center;gap:10px;
      width:100%;background:#25d366;color:white;border:none;border-radius:14px;
      padding:16px;font-size:1rem;font-weight:900;cursor:pointer;text-decoration:none;
      margin-bottom:10px;font-family:'Cairo',sans-serif;
      box-shadow:0 4px 16px rgba(37,211,102,.35);transition:transform .15s,box-shadow .15s
    }
    .wa-btn:active{transform:scale(.97);box-shadow:0 2px 8px rgba(37,211,102,.25)}
    .store-btn{
      display:flex;align-items:center;justify-content:center;gap:8px;
      width:100%;background:#0f172a;color:white;border:none;border-radius:14px;
      padding:14px;font-size:.9rem;font-weight:800;cursor:pointer;text-decoration:none;
      font-family:'Cairo',sans-serif
    }

    /* ── فوتر ── */
    .footer{text-align:center;padding:20px;font-size:.72rem;color:#94a3b8}

    /* ── خطأ ── */
    .error-wrap{padding:60px 24px;text-align:center}
    .error-wrap .err-icon{font-size:3rem;margin-bottom:12px}
    .error-wrap p{color:#64748b;font-size:.9rem}
  </style>
</head>
<body>

<!-- شاشة التحميل -->
<div id="loadScreen">
  <div class="ls-spinner"></div>
  <div class="ls-brand" id="lsBrand">برجمان</div>
</div>

<!-- الهيدر -->
<div class="top-bar">
  <div class="logo-box" id="topLogo"><span class="logo-emoji">🏪</span></div>
  <div class="brand-name" id="topBrand">برجمان</div>
  <a class="store-link" id="topStoreLink" href="#">🛍️ المتجر</a>
</div>

<!-- محتوى المنتج -->
<div id="prodContent" style="display:none">

  <!-- صورة المنتج -->
  <div class="prod-img-wrap" id="imgWrap">
    <div class="no-img" id="noImg">📦</div>
    <img id="prodImg" src="" alt="" style="display:none" onerror="document.getElementById('noImg').style.display='flex';this.style.display='none'">
  </div>

  <!-- البطاقة الرئيسية -->
  <div class="card">
    <div class="card-body">
      <div class="cat-badge" id="prodCat" style="display:none">🏷️ <span id="prodCatTxt"></span></div>
      <div class="prod-name" id="prodName"></div>

      <!-- السعر -->
      <div class="price-section" id="priceSection">
        <div class="price-box" id="retailPriceBox">
          <div class="price-lbl">سعر المفرد</div>
          <div class="price-val" id="retailPrice"></div>
          <div class="price-unit">دينار عراقي</div>
        </div>
        <div class="price-divider" id="priceDivider"></div>
        <div class="price-box" id="wholesalePriceBox" style="display:none">
          <div class="price-lbl">سعر الجملة</div>
          <div class="price-val" id="wholesalePrice" style="color:#0369a1"></div>
          <div class="price-unit">دينار عراقي</div>
        </div>
        <div class="price-ask" id="priceAsk" style="display:none">
          💬 للاستفسار عن<br>الأسعار تواصل معنا
        </div>
      </div>

      <!-- التفاصيل -->
      <div class="detail-txt" id="prodDetail"></div>

      <!-- شبكة التعبئة -->
      <div class="pkg-grid" id="pkgGrid" style="display:none"></div>

      <!-- أزرار -->
      <a id="waBtn" class="wa-btn" href="#" target="_blank">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        تواصل معنا عبر واتساب
      </a>
      <a id="storeBtn" class="store-btn" href="#">
        🛍️ تصفح المتجر كاملاً
      </a>
    </div>
  </div>

  <div class="footer" id="footerBrand">برجمان — للمفرد والجملة</div>
</div>

<!-- حالة الخطأ -->
<div id="errorState" style="display:none" class="error-wrap">
  <div class="err-icon">⚠️</div>
  <p id="errorMsg">حدث خطأ</p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey:            "AIzaSyBMLyYD0U5v3B3CWv80i-1mUGpBpkNKB98",
    authDomain:        "burjuman-6cb83.firebaseapp.com",
    projectId:         "burjuman-6cb83",
    storageBucket:     "burjuman-6cb83.firebasestorage.app",
    messagingSenderId: "177984721378",
    appId:             "1:177984721378:web:afb0a673eb1a4f1c1b69bb"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const prodId   = new URLSearchParams(location.search).get('id');
  const storeUrl = location.origin;

  function hideLoad() {
    const ls = document.getElementById('loadScreen');
    ls.style.opacity = '0';
    setTimeout(() => ls.style.display = 'none', 400);
  }

  function showError(msg) {
    hideLoad();
    document.getElementById('errorMsg').textContent = msg;
    document.getElementById('errorState').style.display = 'block';
  }

  function setMeta(id, val) {
    const el = document.getElementById(id);
    if (el) el.content = val;
  }

  async function init() {
    // تحميل الإعدادات أولاً
    let s = {};
    try {
      const snap = await db.collection('settings').get();
      snap.docs.forEach(d => { const data = d.data(); if (data.key) s[data.key] = data.value; });
    } catch(e) {}

    const company  = s.company_name_ar || 'برجمان';
    const companyEn= s.company_name_en  || '';
    const wa       = (s.whatsapp_number || '').replace(/\D/g,''); // أرقام فقط
    const logo     = s.company_logo     || '';
    const siteUrl  = s.site_url         || storeUrl;

    // تحديث الهيدر والفوتر
    document.getElementById('lsBrand').textContent    = company;
    document.getElementById('topBrand').textContent   = company;
    document.getElementById('topStoreLink').href      = siteUrl;
    document.getElementById('storeBtn').href          = siteUrl;
    document.getElementById('footerBrand').textContent= company + ' — للمفرد والجملة';
    document.getElementById('pageTitle').textContent  = company;
    setMeta('ogSite', company);

    if (logo) {
      document.getElementById('topLogo').innerHTML =
        `<img src="${logo}" alt="${company}" onerror="this.parentElement.innerHTML='<span class=logo-emoji>🏪</span>'">`;
    }

    if (!prodId) { showError('لم يتم تحديد المنتج'); return; }

    // تحميل المنتج
    try {
      const doc = await db.collection('products').doc(prodId).get();
      if (!doc.exists) { showError('المنتج غير موجود'); return; }
      const p = doc.data();

      const name      = p.name     || '';
      const cat       = p.category || p.cat || '';
      const detail    = p.detail   || p.description || '';
      const imgUrl    = p.image    || p.img || '';
      const price     = parseFloat(p.price)          || 0;
      const wPrice    = parseFloat(p.wholesalePrice) || 0;

      // ── OG Tags ──
      const ogTitle = `${name}${cat ? ' — ' + cat : ''} | ${company}`;
      const pkgEntries = p.packaging ? Object.entries(p.packaging) : [];
      const pkgText = pkgEntries.map(([u,q]) => `${u}: ${q} قطعة`).join(' | ');
      const priceDesc = price > 0 ? `سعر المفرد: ${price.toLocaleString()} د.ع` : 'استفسر عن السعر';
      const ogDesc = [priceDesc, detail, pkgText, 'للاستفسار والطلب تواصل معنا'].filter(Boolean).join(' • ');

      setMeta('ogTitle', ogTitle);  setMeta('twTitle', ogTitle);
      setMeta('ogDesc',  ogDesc);   setMeta('twDesc',  ogDesc);
      setMeta('ogImage', imgUrl);   setMeta('twImage', imgUrl);
      setMeta('ogUrl',   location.href);
      document.getElementById('pageTitle').textContent = ogTitle;

      // ── الصورة ──
      if (imgUrl) {
        const img = document.getElementById('prodImg');
        img.src = imgUrl;
        img.alt = name;
        img.style.display = 'block';
        document.getElementById('noImg').style.display = 'none';
      }

      // ── الاسم والتصنيف ──
      document.getElementById('prodName').textContent = name;
      if (cat) {
        document.getElementById('prodCat').style.display = 'inline-flex';
        document.getElementById('prodCatTxt').textContent = cat;
      }

      // ── السعر ──
      if (price > 0) {
        document.getElementById('retailPrice').textContent = price.toLocaleString();
        if (wPrice > 0) {
          document.getElementById('wholesalePrice').textContent = wPrice.toLocaleString();
          document.getElementById('wholesalePriceBox').style.display = 'block';
          document.getElementById('priceDivider').style.display = 'block';
        } else {
          document.getElementById('priceDivider').style.display = 'none';
        }
      } else if (wPrice > 0) {
        // فقط سعر جملة بدون مفرد
        document.getElementById('retailPriceBox').style.display = 'none';
        document.getElementById('priceDivider').style.display = 'none';
        document.getElementById('wholesalePrice').textContent = wPrice.toLocaleString();
        document.getElementById('wholesalePriceBox').style.display = 'block';
      } else {
        // لا يوجد سعر — اعرض "استفسر"
        document.getElementById('retailPriceBox').style.display = 'none';
        document.getElementById('priceDivider').style.display = 'none';
        document.getElementById('priceAsk').style.display = 'block';
      }

      // ── التفاصيل ──
      if (detail) document.getElementById('prodDetail').textContent = detail;

      // ── شبكة التعبئة ──
      const grid = [];
      pkgEntries.forEach(([unit, qty]) => {
        grid.push(`<div class="pkg-item"><div class="val">${qty}</div><div class="lbl">📦 ${unit}</div></div>`);
      });
      if (p.carton_weight) grid.push(`<div class="pkg-item"><div class="val">${p.carton_weight} كغ</div><div class="lbl">⚖️ وزن الكرتون</div></div>`);
      if (p.carton_volume) grid.push(`<div class="pkg-item"><div class="val">${p.carton_volume} م³</div><div class="lbl">📐 الحجم الكتلي</div></div>`);
      if (p.carton_weight && pkgEntries.length) {
        const maxQty = Math.max(...pkgEntries.map(([,q]) => q));
        if (maxQty > 0) {
          const pw = (p.carton_weight / maxQty).toFixed(3);
          grid.push(`<div class="pkg-item"><div class="val">${pw} كغ</div><div class="lbl">🔹 وزن القطعة</div></div>`);
        }
      }
      if (grid.length) {
        document.getElementById('pkgGrid').innerHTML = grid.join('');
        document.getElementById('pkgGrid').style.display = 'grid';
      }

      // ── واتساب — رقم الشركة دائماً ──
      const waMsg = encodeURIComponent(`مرحباً، أريد الاستفسار عن: ${name}\n${location.href}`);
      if (wa) {
        document.getElementById('waBtn').href = `https://wa.me/${wa}?text=${waMsg}`;
      } else {
        // إذا لم يُضبط رقم، أخفِ الزر
        document.getElementById('waBtn').style.display = 'none';
      }

      hideLoad();
      document.getElementById('prodContent').style.display = 'block';

    } catch(e) {
      showError('حدث خطأ أثناء التحميل');
      console.error(e);
    }
  }

  init();
</script>
</body>
</html>
