<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تتبع الطلب - برجمان</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .track-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px 24px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 12px;
            color: white;
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
        }
        h1 {
            color: #333;
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .order-id {
            color: #666;
            font-size: 0.9rem;
            background: #f5f5f5;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
        }
        .progress-container {
            margin: 30px 0;
        }
        .step {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }
        .step:not(:last-child)::before {
            content: '';
            position: absolute;
            right: 20px;
            top: 40px;
            width: 2px;
            height: calc(100% + 10px);
            background: #e0e0e0;
        }
        .step.completed:not(:last-child)::before {
            background: linear-gradient(to bottom, #0ea5e9, #0284c7);
        }
        .step-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin-left: 15px;
            position: relative;
            z-index: 2;
            border: 2px solid #e0e0e0;
            flex-shrink: 0;
        }
        .step.completed .step-icon {
            background: var(--step-color, #0ea5e9);
            border-color: transparent;
            color: white;
        }
        .step.active .step-icon {
            background: var(--step-color, #0ea5e9);
            border-color: var(--step-color, #0ea5e9);
            color: white;
            animation: pulse 2s infinite;
        }
        .step.completed:not(:last-child)::before {
            background: var(--step-color, #0ea5e9);
        }
        .vehicle-analysis {
            background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
            border: 1px solid #bae6fd;
            border-radius: 16px;
            padding: 16px;
            margin: 16px 0;
        }
        .vehicle-analysis h4 { color:#0284c7; font-size:.95rem; margin-bottom:10px; font-weight:800; }
        .vehicle-fit-row {
            display:flex; align-items:center; gap:8px;
            background:white; border-radius:10px; padding:8px 10px; margin-bottom:8px;
        }
        .vehicle-fit-bar { flex:1; height:8px; background:#e0e0e0; border-radius:10px; overflow:hidden; }
        .vehicle-fit-fill { height:100%; border-radius:10px; transition:width .3s; }
        .waiting-msg {
            background:linear-gradient(135deg,#fffbeb,#fef3c7);
            border:2px solid #fde68a; border-radius:14px;
            padding:14px; text-align:center; color:#92400e;
            font-weight:700; margin:10px 0; font-size:.9rem;
        }
        .urgent-btn {
            background:linear-gradient(135deg,#ef4444,#dc2626);
            color:white; border:none; padding:12px 20px;
            border-radius:14px; font-weight:700; font-size:.95rem;
            cursor:pointer; width:100%; font-family:'Tajawal',sans-serif; margin:8px 0;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(14, 165, 233, 0); }
            100% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0); }
        }
        .step-content {
            flex: 1;
        }
        .step-title {
            font-weight: 800;
            color: #333;
            margin-bottom: 2px;
        }
        .step-time {
            font-size: 0.75rem;
            color: #999;
        }
        .info-card {
            background: linear-gradient(135deg, #0ea5e910, #0284c710);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(14, 165, 233, 0.2);
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .info-label {
            color: #666;
            font-weight: 500;
        }
        .info-value {
            font-weight: 800;
            color: #333;
        }
        .driver-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: white;
            border-radius: 15px;
            margin: 15px 0;
        }
        .driver-avatar {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }
        .driver-details {
            flex: 1;
        }
        .driver-name {
            font-weight: 800;
            color: #333;
        }
        .driver-phone {
            font-size: 0.85rem;
            color: #666;
            direction: ltr;
            text-align: right;
        }
        .vehicle-tag {
            background: #0ea5e920;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #0284c7;
            font-weight: 700;
        }
        .btn {
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            font-family: 'Tajawal', sans-serif;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .loader {
            text-align: center;
            padding: 40px;
        }
        .loader span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #0ea5e9;
            margin: 0 3px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loader span:nth-child(1) { animation-delay: -0.32s; }
        .loader span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .error {
            text-align: center;
            color: #dc3545;
            padding: 20px;
        }
        .whatsapp-btn {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-family: 'Tajawal', sans-serif;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 0.8rem;
        }
        /* Rating Section */
        .rating-section {
            background: linear-gradient(135deg, #fefce8, #fef9c3);
            border: 2px solid #fde68a;
            border-radius: 20px;
            padding: 20px;
            margin-top: 16px;
        }
        .rating-section h3 {
            text-align: center;
            color: #92400e;
            font-size: 1.1rem;
            margin-bottom: 16px;
        }
        .rating-label { font-weight: 700; color: #555; margin-bottom: 6px; font-size: .9rem; }
        .stars-row { display:flex; gap:6px; margin-bottom:14px; }
        .star-btn {
            font-size: 1.8rem; background:none; border:none; cursor:pointer;
            transition:transform .15s; padding:2px;
        }
        .star-btn:hover { transform:scale(1.2); }
        .rating-note {
            width:100%; padding:10px 12px; border:2px solid #fde68a;
            border-radius:12px; font-family:'Tajawal',sans-serif;
            font-size:.9rem; resize:none; background:white;
            margin-bottom:12px;
        }
        .submit-rating-btn {
            background:linear-gradient(135deg,#f59e0b,#d97706);
            color:white; border:none; padding:12px; border-radius:14px;
            font-weight:700; font-size:1rem; cursor:pointer; width:100%;
            font-family:'Tajawal',sans-serif;
        }
        .rating-done {
            text-align:center; color:#059669; font-weight:800;
            background:#f0fdf4; border:2px solid #86efac;
            border-radius:16px; padding:16px; margin-top:16px;
        }

        /* Page disabled after rating */
        .page-disabled {
            position: relative;
            pointer-events: none;
            user-select: none;
        }
        .page-disabled::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(200, 200, 200, 0.55);
            border-radius: inherit;
            z-index: 10;
        }
        .disabled-notice {
            background: #f3f4f6;
            border: 2px solid #d1d5db;
            border-radius: 16px;
            padding: 18px;
            text-align: center;
            color: #6b7280;
            font-weight: 700;
            margin-top: 16px;
            font-size: 0.9rem;
        }

        /* Expired page */
        .expired-card {
            text-align: center;
            padding: 30px 10px;
        }
        .expired-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }
        .expired-title {
            font-size: 1.3rem;
            font-weight: 900;
            color: #9ca3af;
            margin-bottom: 8px;
        }
        .expired-msg {
            color: #9ca3af;
            font-size: 0.9rem;
            line-height: 1.7;
        }

        /* Near Notification Popup */
        .near-popup-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeInOverlay 0.3s ease;
        }
        .near-popup-overlay.show { display: flex; }
        @keyframes fadeInOverlay {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .near-popup-box {
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            text-align: center;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(0,0,0,0.35);
            animation: popupBounce 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }
        @keyframes popupBounce {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); }
        }
        .near-popup-icon {
            font-size: 4rem;
            margin-bottom: 12px;
            animation: bounce2 1s infinite;
        }
        @keyframes bounce2 {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .near-popup-title {
            font-size: 1.4rem;
            font-weight: 900;
            color: #d97706;
            margin-bottom: 8px;
        }
        .near-popup-msg {
            color: #444;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .near-popup-close {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
        }
    </style>
</head>
<body>
    <div class="track-card" id="trackCard">
        <div class="header">
            <div class="logo">🏪</div>
            <h1>برجمان</h1>
            <div class="order-id" id="orderId">...</div>
        </div>

        <div id="content">
            <div class="loader">
                <span></span><span></span><span></span>
                <p style="margin-top:15px; color:#666;">جاري التحميل...</p>
            </div>
        </div>

        <div class="footer">
            © 2025 برجمان
        </div>
    </div>

    <!-- Near Notification Popup -->
    <div class="near-popup-overlay" id="nearPopup">
        <div class="near-popup-box">
            <div class="near-popup-icon">🚗</div>
            <div class="near-popup-title">السائق قريب منك!</div>
            <div class="near-popup-msg" id="nearPopupMsg">السائق على بعد 500 متر منك، يرجى الاستعداد لاستلام طلبك!</div>
            <button class="near-popup-close" onclick="document.getElementById('nearPopup').classList.remove('show')">حسناً، شكراً!</button>
        </div>
    </div>

    <script>
        // ✅ Firebase Config من مشروعك
        const firebaseConfig = {
            apiKey: "AIzaSyBMLyYD0U5v3B3CWv80i-1mUGpBpkNKB98",
            authDomain: "burjuman-6cb83.firebaseapp.com",
            projectId: "burjuman-6cb83",
            storageBucket: "burjuman-6cb83.firebasestorage.app",
            messagingSenderId: "177984721378",
            appId: "1:177984721378:web:afb0a673eb1a4f1c1b69bb"
        };

        // ✅ تشغيل Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ── Delivery vehicle settings (loaded from Firestore) ──
        let DELIVERY_VEHICLES = null;
        async function loadVehicleSettings() {
            try {
                const snap = await db.collection('settings').where('key','==','delivery_vehicles').get();
                if (!snap.empty) {
                    const d = snap.docs[0].data();
                    if (d.value && typeof d.value === 'object') { DELIVERY_VEHICLES = d.value; return; }
                }
            } catch(e) {}
            // fallback defaults
            DELIVERY_VEHICLES = {
                scooter: { name:'ستوتة',  icon:'🛵', capacity:0.4,  maxWeight:20   },
                pickup:  { name:'بيك اب', icon:'🚐', capacity:6,    maxWeight:500  },
                truck:   { name:'شاحنة',  icon:'🚛', capacity:30,   maxWeight:3000 }
            };
        }

        // ✅ قراءة رقم الطلب من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order');
        
        document.getElementById('orderId').textContent = orderId || 'غير موجود';

        // ✅ إذا ماكو رقم طلب
        if (!orderId) {
            document.getElementById('content').innerHTML = '<div class="error">❌ رابط غير صحيح</div>';
        } else {
            // load vehicle settings in background, then search for order
            loadVehicleSettings();
            // ✅ البحث عن الطلب
            db.collection('orders').where('orderId', '==', orderId).get()
                .then((snapshot) => {
                    if (snapshot.empty) {
                        // جرب البحث بالـ ID نفسه
                        return db.collection('orders').doc(orderId).get();
                    } else {
                        return snapshot.docs[0];
                    }
                })
                .then((doc) => {
                    if (!doc || !doc.exists) {
                        document.getElementById('content').innerHTML = '<div class="error">❌ الطلب غير موجود</div>';
                        return;
                    }

                    const order = { id: doc.id, ...doc.data() };

                    // Check 24-hour expiry for delivered orders
                    if (isExpired(order)) {
                        showExpiredPage();
                        return;
                    }

                    showOrderStatus(order);

                    // If already rated on load, gray out immediately
                    if (order.customer_rated) {
                        setTimeout(disablePage, 100);
                    }

                    // Track last seen near_notification to avoid re-showing
                    let lastNearTimestamp = order.near_notification?.timestamp || null;

                    // ✅ تحديث مباشر
                    db.collection('orders').doc(order.id).onSnapshot((snap) => {
                        if (snap.exists) {
                            const updated = { id: snap.id, ...snap.data() };

                            if (isExpired(updated)) {
                                showExpiredPage();
                                return;
                            }

                            showOrderStatus(updated);

                            // Gray out if rated
                            if (updated.customer_rated && !document.getElementById('content').classList.contains('page-disabled')) {
                                setTimeout(disablePage, 100);
                            }

                            // Show popup when driver marks "nearby"
                            const nearNotif = updated.near_notification;
                            if (nearNotif && nearNotif.timestamp && nearNotif.timestamp !== lastNearTimestamp) {
                                lastNearTimestamp = nearNotif.timestamp;
                                const msg = nearNotif.message || 'السائق على بعد 500 متر منك، يرجى الاستعداد لاستلام طلبك!';
                                document.getElementById('nearPopupMsg').textContent = msg;
                                document.getElementById('nearPopup').classList.add('show');

                                // Try browser push notification
                                if ('Notification' in window && Notification.permission === 'granted') {
                                    new Notification('برجمان - السائق قريب! 🚗', { body: msg, icon: '/favicon.ico' });
                                } else if ('Notification' in window && Notification.permission !== 'denied') {
                                    Notification.requestPermission().then(p => {
                                        if (p === 'granted') new Notification('برجمان - السائق قريب! 🚗', { body: msg });
                                    });
                                }
                            }
                        }
                    });
                })
                .catch((error) => {
                    console.error(error);
                    document.getElementById('content').innerHTML = '<div class="error">❌ حدث خطأ</div>';
                });
        }

        // ✅ دالة عرض حالة الطلب
        function showOrderStatus(order) {
            // Each step has its own color — gray until confirmed by the relevant department
            const steps = [
                { icon: '✅', title: 'تأكيد الطلب',  color: '#0ea5e9' },
                { icon: '📦', title: 'جاري التجهيز', color: '#f59e0b' },
                { icon: '🚀', title: 'تم التجهيز',   color: '#10b981' },
                { icon: '🚗', title: 'في الطريق',    color: '#8b5cf6' },
                { icon: '🏠', title: 'تم التسليم',   color: '#059669' }
            ];

            let currentStep = 0;
            if (order.status === 'Delivered') currentStep = 5;
            else if (order.status === 'In Delivery' || order.status === 'NearCustomer') currentStep = 4;
            else if (order.status === 'Prepared') currentStep = 3;
            else if (order.status === 'Preparing') currentStep = 2;
            else if (order.status === 'Confirmed' || order.status === 'Pending') currentStep = 1;

            let stepsHtml = '';
            steps.forEach((step, i) => {
                const isCompleted = i < currentStep;
                const isActive    = i === currentStep - 1;
                const titleColor  = (isCompleted || isActive) ? '#1f2937' : '#9ca3af';
                stepsHtml += `
                    <div class="step ${isCompleted ? 'completed' : ''} ${isActive ? 'active' : ''}"
                         style="--step-color:${step.color}">
                        <div class="step-icon">${step.icon}</div>
                        <div class="step-content">
                            <div class="step-title" style="color:${titleColor}">${step.title}</div>
                        </div>
                    </div>
                `;
            });

            let driverHtml = '';
            if (order.driver_name && currentStep >= 3) {
                driverHtml = `
                    <div class="driver-info">
                        <div class="driver-avatar">🚗</div>
                        <div class="driver-details">
                            <div class="driver-name">${order.driver_name}</div>
                            ${order.vehicle_type ? `<span class="vehicle-tag">🚚 ${order.vehicle_type}</span>` : ''}
                        </div>
                    </div>
                `;
            }

            let nearMsg = '';
            if (order.status === 'NearCustomer') {
                nearMsg = `
                    <div style="background: linear-gradient(135deg, #f59e0b, #d97706); color:white; padding:15px 20px; border-radius:15px; text-align:center; margin:15px 0; animation: pulse 2s infinite; font-weight:700;">
                        🚗 السائق على بعد 500 متر منك! يرجى الاستعداد
                    </div>
                `;
            }

            // Rating section (only after delivery)
            let ratingHtml = '';
            if (order.status === 'Delivered') {
                if (order.customer_rated) {
                    ratingHtml = `
                        <div class="rating-done">
                            ⭐ شكراً على تقييمك!<br>
                            <span style="font-size:.85rem;font-weight:600;color:#065f46">تقييم التوصيل: ${'⭐'.repeat(order.delivery_rating||0)} | تقييم الطلب: ${'⭐'.repeat(order.order_rating||0)}</span>
                        </div>`;
                } else {
                    ratingHtml = `
                        <div class="rating-section" id="ratingSection">
                            <h3>⭐ قيّم تجربتك</h3>
                            <div class="rating-label">🚗 تقييم التوصيل</div>
                            <div class="stars-row" id="delivStars">
                                ${[1,2,3,4,5].map(i=>`<button class="star-btn" onclick="setRating('deliv',${i})" id="ds${i}">☆</button>`).join('')}
                            </div>
                            <div class="rating-label">📦 تقييم البضاعة / الطلب</div>
                            <div class="stars-row" id="orderStars">
                                ${[1,2,3,4,5].map(i=>`<button class="star-btn" onclick="setRating('order',${i})" id="os${i}">☆</button>`).join('')}
                            </div>
                            <textarea class="rating-note" id="ratingNote" rows="2" placeholder="ملاحظة (اختياري)..."></textarea>
                            <button class="submit-rating-btn" onclick="submitRating('${order.id}')">✅ إرسال التقييم</button>
                        </div>`;
                }
            }

            // ── Vehicle capacity analysis ──
            let vehicleAnalysisHtml = '';
            const vol = order.total_volume || 0;
            const wgt = order.total_weight || 0;
            if (DELIVERY_VEHICLES && vol > 0) {
                const vehicles = Object.entries(DELIVERY_VEHICLES);
                const smallestCap = Math.min(...vehicles.map(([,v]) => v.capacity));
                const isSmall = vol < smallestCap * 0.2;

                const vehicleRowsHtml = vehicles.map(([, v]) => {
                    const pct = Math.min(100, (vol / v.capacity) * 100);
                    const fits = vol <= v.capacity;
                    const barColor = !fits ? '#ef4444' : pct > 80 ? '#f59e0b' : '#10b981';
                    return `
                        <div class="vehicle-fit-row">
                            <span style="font-size:1.3rem">${v.icon}</span>
                            <span style="font-weight:700;font-size:.85rem;min-width:55px">${v.name}</span>
                            <div class="vehicle-fit-bar">
                                <div class="vehicle-fit-fill" style="width:${pct.toFixed(0)}%;background:${barColor}"></div>
                            </div>
                            <span style="font-size:.78rem;font-weight:700;color:${barColor};min-width:38px">${pct.toFixed(0)}%</span>
                            <span style="font-size:.85rem">${fits ? '✅' : '❌'}</span>
                        </div>`;
                }).join('');

                const waitingMsgHtml = isSmall ? `
                    <div class="waiting-msg">
                        ⏳ حجم طلبك صغير — في انتظار تجميع قوائم أخرى للتوصيل معاً
                    </div>` : '';

                const urgentBtnHtml = order.status !== 'Delivered'
                    ? (order.urgent_requested
                        ? `<div style="background:#fef3c7;border:2px solid #fde68a;border-radius:12px;padding:10px;text-align:center;color:#92400e;font-weight:700;font-size:.88rem;margin:8px 0">⚡ تم طلب التوصيل العاجل — جاري المعالجة</div>`
                        : `<button class="urgent-btn" onclick="requestUrgent('${order.id}')">⚡ أحتاج طلبي الآن — توصيل عاجل (رسوم إضافية)</button>`)
                    : '';

                vehicleAnalysisHtml = `
                    <div class="vehicle-analysis">
                        <h4>🚚 تحليل حجم الطلب</h4>
                        <div style="font-size:.82rem;color:#0284c7;margin-bottom:10px">
                            📐 حجم الطلب: <strong>${vol.toFixed(3)} م³</strong>
                            ${wgt > 0 ? ` | ⚖️ الوزن: <strong>${wgt.toFixed(1)} كغ</strong>` : ''}
                        </div>
                        ${vehicleRowsHtml}
                    </div>
                    ${waitingMsgHtml}
                    ${urgentBtnHtml}`;
            } else if (order.vehicle_type) {
                vehicleAnalysisHtml = `
                    <div style="background:#f0fdf4;border:1px solid #86efac;border-radius:12px;padding:10px 14px;margin:12px 0;font-size:.9rem;font-weight:700;color:#065f46">
                        🚚 مركبة التوصيل: ${order.vehicle_type}
                    </div>`;
            }

            document.getElementById('content').innerHTML = `
                <div class="progress-container">${stepsHtml}</div>
                ${nearMsg}
                ${vehicleAnalysisHtml}
                <div class="info-card">
                    <div class="info-row">
                        <span>🏪 المحل</span>
                        <span>${order.shopName || '—'}</span>
                    </div>
                    <div class="info-row">
                        <span>📍 العنوان</span>
                        <span>${order.shopAddress || '—'}</span>
                    </div>
                    <div class="info-row">
                        <span>💰 الإجمالي</span>
                        <span>${(order.total || 0).toLocaleString()} د.ع</span>
                    </div>
                </div>
                ${driverHtml}
                ${ratingHtml}
            `;
        }

        let delivRating = 0, orderRating = 0;

        window.setRating = function(type, val) {
            if (type === 'deliv') {
                delivRating = val;
                for (let i=1;i<=5;i++) {
                    const s=document.getElementById(`ds${i}`);
                    if(s) s.textContent = i<=val ? '⭐' : '☆';
                }
            } else {
                orderRating = val;
                for (let i=1;i<=5;i++) {
                    const s=document.getElementById(`os${i}`);
                    if(s) s.textContent = i<=val ? '⭐' : '☆';
                }
            }
        };

        window.submitRating = async function(docId) {
            if (!delivRating || !orderRating) {
                alert('⚠️ يرجى اختيار التقييم للتوصيل والبضاعة');
                return;
            }
            const note = document.getElementById('ratingNote')?.value.trim() || '';
            const btn  = document.querySelector('.submit-rating-btn');
            if (btn) { btn.disabled=true; btn.textContent='⏳ جاري الإرسال...'; }
            try {
                await db.collection('orders').doc(docId).update({
                    delivery_rating: delivRating,
                    order_rating:    orderRating,
                    rating_note:     note,
                    customer_rated:  true,
                    rated_at:        new Date().toISOString()
                });
                // onSnapshot will re-render automatically; update DOM only if element still exists
                const rs = document.getElementById('ratingSection');
                if (rs) {
                    rs.outerHTML = `
                        <div class="rating-done">
                            ⭐ شكراً على تقييمك!<br>
                            <span style="font-size:.85rem;font-weight:600;color:#065f46">تقييم التوصيل: ${'⭐'.repeat(delivRating)} | تقييم الطلب: ${'⭐'.repeat(orderRating)}</span>
                        </div>`;
                }
                // Gray out the page after successful rating
                disablePage();
            } catch(e) {
                console.error(e);
                if(btn){btn.disabled=false;btn.textContent='✅ إرسال التقييم';}
                alert('❌ حدث خطأ، حاول مجدداً');
            }
        };

        // ── Helper: check if order link has expired (24h after delivery) ──
        function isExpired(order) {
            if (order.status !== 'Delivered') return false;
            if (!order.delivered_at) return false;
            const deliveredTime = new Date(order.delivered_at).getTime();
            return (Date.now() - deliveredTime) > 24 * 60 * 60 * 1000;
        }

        // ── Show expired page to customer ──
        function showExpiredPage() {
            document.getElementById('content').innerHTML = `
                <div class="expired-card">
                    <div class="expired-icon">🔒</div>
                    <div class="expired-title">انتهت صلاحية الرابط</div>
                    <div class="expired-msg">
                        مضت أكثر من 24 ساعة على تسليم طلبك.<br>
                        هذا الرابط لم يعد متاحاً.<br><br>
                        شكراً لاختيارك <strong>برجمان</strong> 💙
                    </div>
                </div>
            `;
            // Gray out the card too
            document.getElementById('trackCard').classList.add('page-disabled');
        }

        // ── Urgent order request ──
        window.requestUrgent = async function(docId) {
            if (!confirm('سيُضاف رسم إضافي للتوصيل العاجل. هل تريد المتابعة؟')) return;
            try {
                const now = new Date().toISOString();
                // 1. تحديث الطلب في Firestore
                await db.collection('orders').doc(docId).update({
                    urgent_requested: true,
                    urgent_requested_at: now
                });

                // 2. جلب بيانات الطلب لبناء رسالة الإشعار
                const orderSnap = await db.collection('orders').doc(docId).get();
                const ord = orderSnap.exists ? orderSnap.data() : {};
                const TG_TOKEN = '8142978736:AAEpT6L_RNNIUMx54mU83gx4ap_Z3VmuXsA';
                const urgentMsg =
                    `⚡ *طلب توصيل عاجل!*\n\n` +
                    `🏪 المحل: ${ord.shopName || '—'}\n` +
                    `📍 العنوان: ${ord.shopAddress || '—'}\n` +
                    `🆔 رقم الطلب: ${ord.orderId || docId}\n` +
                    `💰 الإجمالي: ${(ord.total || 0).toLocaleString()} د.ع\n\n` +
                    `⚠️ الزبون يطلب التوصيل الآن مقابل رسوم إضافية`;

                // 3. إشعار المجموعة
                fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ chat_id: '-5246620507', text: urgentMsg, parse_mode: 'Markdown' })
                }).catch(()=>{});

                // 4. إشعار فردي لكل ادمن / مشرف / مدير مبيعات عنده معرف تيليجرام
                const usersSnap = await db.collection('users').get();
                const approverTypes = ['admin','sales_manager','supervisor'];
                usersSnap.docs.forEach(d => {
                    const u = d.data();
                    if (approverTypes.includes(u.accountType || u.type) && u.telegram) {
                        fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                            method: 'POST',
                            headers: {'Content-Type':'application/json'},
                            body: JSON.stringify({ chat_id: u.telegram, text: urgentMsg, parse_mode: 'Markdown' })
                        }).catch(()=>{});
                    }
                });

                showToast('✅ تم إرسال طلب التوصيل العاجل');
            } catch(e) {
                console.error(e);
                alert('❌ حدث خطأ، حاول مجدداً');
            }
        };

        // ── Toast ──
        function showToast(msg, ok=true) {
            const t = document.createElement('div');
            t.textContent = msg;
            t.style.cssText = `position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:${ok?'#10b981':'#ef4444'};color:white;padding:12px 24px;border-radius:50px;font-weight:700;z-index:9999;box-shadow:0 5px 15px rgba(0,0,0,.2);font-family:'Tajawal',sans-serif;`;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2800);
        }

        // ── Gray out page after rating ──
        function disablePage() {
            const content = document.getElementById('content');
            content.classList.add('page-disabled');
            // Add notice below
            const notice = document.createElement('div');
            notice.className = 'disabled-notice';
            notice.innerHTML = '🔒 تم إغلاق هذا الطلب · شكراً لك على تقييمك';
            content.after(notice);
        }
    </script>
</body>
</html>
